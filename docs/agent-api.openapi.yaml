openapi: 3.0.3
info:
  title: Boscopan Agent API (Blockchain Lite)
  description: |
    **Boscopan** — AI agent blockchain abstraction: agents send intents; the server handles chain, CRE, and x402.
    This is the single REST interface for AI agents — no RPC, ABI, or wallet details needed by the agent.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local server

paths:
  /agent/summary:
    get:
      summary: Last scheduled agent summary
      description: Returns the last summary from the scheduled reasoning cycle (alerts + prices, LLM).
      responses:
        '200':
          description: Last summary and timestamp
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: { type: string; nullable: true }
                  lastRunAt: { type: integer; nullable: true; description: Unix ms }

  /agent/run-alerts-check:
    post:
      summary: Run alerts check now
      description: Runs the same logic as the CRE cron (which alerts would trigger). If CRE_RUN_CHECK_URL is set, also triggers the CRE workflow (prices + RuleRegistry + Pushover).
      responses:
        '200':
          description: Check result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunAlertsCheckResponse' }

  /agent/action:
    post:
      summary: Execute an agent intent
      description: |
        Single entry point for agent actions. Send `intent` and `params`; the server performs
        the action (chain, CRE, x402). For paid intents (e.g. create_alert), the server returns
        402 with payment details; the agent then pays and calls the indicated endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentActionRequest'
      responses:
        '200':
          description: Success (intent result)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ListAlertsResponse'
                  - $ref: '#/components/schemas/GetPriceResponse'
                  - $ref: '#/components/schemas/CancelAlertResponse'
                  - $ref: '#/components/schemas/CreateAlertResponse'
                  - $ref: '#/components/schemas/RunAlertsCheckResponse'
        '402':
          description: Payment required (for create_alert). Body includes payment challenge and agentAction.forwardTo.
        '400':
          description: Bad request (missing intent/params or unknown intent)
        '503':
          description: Service unavailable (e.g. price API or alert creation failed)
      security:
        - AgentWallet: []
        - x402Payment: []

components:
  securitySchemes:
    AgentWallet:
      type: apiKey
      in: header
      name: X-Agent-Wallet
      description: Wallet address for list_alerts / cancel_alert (no payment)
    x402Payment:
      type: apiKey
      in: header
      name: x-payment
      description: x402 payment header (required for create_alert when fulfilling after 402)

  schemas:
    AgentActionRequest:
      type: object
      required: [intent]
      properties:
        intent:
          type: string
          enum: [create_alert, list_alerts, get_price, cancel_alert, run_alerts_check]
          description: Action to perform
        params:
          type: object
          description: Intent-specific parameters (see tool schemas below)

    CreateAlertParams:
      type: object
      required: [asset, condition, target]
      properties:
        asset: { type: string; enum: [BTC, ETH, LINK] }
        condition: { type: string; enum: [gt, lt, gte, lte] }
        target: { type: number; description: Target price in USD }

    ListAlertsParams:
      type: object
      properties:
        payer: { type: string; description: Wallet address (or use X-Agent-Wallet header) }

    GetPriceParams:
      type: object
      properties:
        asset: { type: string; enum: [BTC, ETH, LINK]; description: Optional; if omitted, returns all three prices }

    CancelAlertParams:
      type: object
      properties:
        payer: { type: string }
        alert_id: { type: string }
        alert_index: { type: integer; minimum: 1; description: 1-based index }

    CreateAlertResponse:
      type: object
      properties:
        alert: { $ref: '#/components/schemas/Alert' }

    ListAlertsResponse:
      type: object
      properties:
        intent: { type: string; example: list_alerts }
        alerts: { type: array; items: { $ref: '#/components/schemas/Alert' } }

    GetPriceResponse:
      type: object
      properties:
        intent: { type: string; example: get_price }
        asset: { type: string }
        priceUsd: { type: number }
        prices: { type: object; additionalProperties: { type: number }; description: When asset omitted }

    CancelAlertResponse:
      type: object
      properties:
        intent: { type: string; example: cancel_alert }
        cancelled: { type: string }
        cancelledIndex: { type: integer }

    RunAlertsCheckResponse:
      type: object
      properties:
        intent: { type: string; example: run_alerts_check }
        summary: { type: string }
        triggered: { type: array; items: { $ref: '#/components/schemas/TriggeredAlert' } }
        alertsCount: { type: integer }

    TriggeredAlert:
      type: object
      properties:
        id: { type: string }
        asset: { type: string }
        condition: { type: string }
        targetPriceUsd: { type: number }
        currentPrice: { type: number }

    Alert:
      type: object
      properties:
        id: { type: string }
        asset: { type: string }
        condition: { type: string }
        targetPriceUsd: { type: number }
        payer: { type: string }
        createdAt: { type: integer }
