openapi: 3.0.3
info:
  title: Pollusk Agent API
  description: Agent-facing "blockchain lite" API for crypto price alerts. One REST entry point for intents; server handles chain, reactivity, and x402.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local Pollusk server

paths:
  /agent/action:
    post:
      summary: Agent action (intent + params)
      description: |
        Single entry point for agent intents. Send `intent` and optional `params`.
        For paid intents (create_alert), server returns 402 with payment challenge;
        agent pays then retries with X-PAYMENT header or calls the returned endpoint.
      operationId: agentAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [intent]
              properties:
                intent:
                  type: string
                  enum: [create_alert, list_alerts, get_price, cancel_alert, run_alerts_check]
                  description: Action to perform
                params:
                  type: object
                  description: Intent-specific parameters (see agent-tools.schema.json)
      parameters:
        - name: X-Agent-Wallet
          in: header
          description: Payer address (for list_alerts, cancel_alert)
          schema: { type: string, example: "0x1234..." }
        - name: X-Payment
          in: header
          description: x402 payment header (required for create_alert after 402)
          schema: { type: string }
      responses:
        "200":
          description: Success; body contains intent result
        "400":
          description: Missing/invalid intent or params
        "402":
          description: Payment required (create_alert); body includes accepts and agentAction.forwardTo
        "503":
          description: Service unavailable (e.g. price service)

  /agent/summary:
    get:
      summary: Last scheduled agent summary
      description: Returns the last summary from the scheduled agent (reasoning over alerts + prices). Only populated when SCHEDULED_AGENT_INTERVAL_MS > 0.
      operationId: getAgentSummary
      responses:
        "200":
          description: Summary and lastRunAt timestamp

  /agent/run-alerts-check:
    post:
      summary: Run alerts check now
      description: Runs the same "alerts check" logic the reactivity cron uses. If REACTIVITY_RUN_CHECK_URL is set, also POSTs to that service.
      operationId: runAlertsCheck
      responses:
        "200":
          description: Result with triggered count, alertsCount, etc.

  /chat:
    post:
      summary: Natural language chat
      description: Send a message; server uses OpenAI to extract intent and execute (create/list/cancel alerts, get price, run alerts check).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
      responses:
        "200":
          description: Reply or tool execution result

  /alerts:
    get:
      summary: List alerts by payer
      parameters:
        - name: payer
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of alerts
    post:
      summary: Create alert (x402)
      description: Requires x402 payment ($0.01 STT). First call returns 402; client pays then retries with X-Payment header.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [asset, condition, targetPriceUsd]
              properties:
                asset: { type: string, enum: [BTC, ETH, LINK] }
                condition: { type: string, enum: [gt, lt, gte, lte] }
                targetPriceUsd: { type: number }
      responses:
        "200":
          description: Created alert and optional transaction hash
        "402":
          description: Payment required

  /prices:
    get:
      summary: Current prices
      parameters:
        - name: asset
          in: query
          schema: { type: string, enum: [BTC, ETH, LINK] }
      responses:
        "200":
          description: USD prices (single asset or all)

  /alerts/cancel:
    post:
      summary: Cancel alert
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [payer]
              properties:
                payer: { type: string }
                alertId: { type: string }
                alertIndex: { type: number, description: "1-based index" }
      responses:
        "200":
          description: Cancelled
